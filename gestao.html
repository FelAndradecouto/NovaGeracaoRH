<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var t=localStorage.getItem("cg-tema");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches)){document.documentElement.setAttribute("data-theme","dark");}}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de pedidos — CG Acessórios</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/marca/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/img/marca/favicon-512.png">
  <link rel="apple-touch-icon" href="assets/img/marca/apple-touch-icon.png">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/gestao.css">
</head>
<body>

  <nav class="nav">
    <div class="wrap">
      <a href="index.html" class="brand"><img src="assets/img/marca/logo.jpg" alt="CG Acessórios" class="brand-logo"> CG Acessórios</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Início</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="pedido.html">Fazer pedido</a></li>
        <li><a href="gestao.html" class="active">Gestão</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Alternar modo claro/escuro"><span class="icon-sol">☀️</span><span class="icon-lua">🌙</span></button>
      <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menu">☰</button>
    </div>
  </nav>

  <header class="gestao-header">
    <div class="wrap">
      <span class="eyebrow on-dark">Uso interno</span>
      <h1>Gestão de pedidos</h1>
    </div>
  </header>

  <div id="portao-acesso" class="portao">
    <div class="portao-card">
      <form id="form-acesso">
        <div class="field">
          <label for="codigo-acesso">Código de acesso</label>
          <input type="password" id="codigo-acesso" placeholder="Digite o código">
        </div>
        <p id="acesso-erro" hidden style="color:var(--rose);">Código incorreto.</p>
        <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
        <p>Esta é apenas uma trava simples, não um login seguro. Não use para dados sensíveis.</p>
      </form>
    </div>
  </div>

  <div id="painel-gestao" class="wrap gestao-wrap" hidden>
    <section class="gestao-secao">
      <h2>Pedidos pendentes</h2>
      <div class="pedido-grid" id="lista-pendentes"></div>
    </section>
    <section class="gestao-secao">
      <h2>Pedidos confirmados</h2>
      <div class="pedido-grid" id="lista-confirmados"></div>
    </section>
  </div>

  <footer class="site-footer">
    <div class="wrap">
      <div class="foot-col">
        <p class="brand" style="color:var(--bone); font-size:1.2rem;"><img src="assets/img/marca/logo.jpg" alt="CG Acessórios" class="brand-logo"> CG Acessórios</p>
        <div class="foot-social" id="foot-social"></div>
      </div>
    </div>
    <div class="foot-bottom">&copy; 2026 CG Acessórios.</div>
  </footer>

  <script>
    document.getElementById("nav-toggle").addEventListener("click", () => {
      document.getElementById("nav-links").classList.toggle("open");
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/tema.js"></script>
  <script src="js/social.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/gestao.js"></script>
</body>
</html>
